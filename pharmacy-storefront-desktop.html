<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Grace Care Pharmacy launcher</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f3efe5;color:#102825;font:16px/1.6 "Segoe UI",sans-serif}.card{width:min(620px,calc(100% - 32px));background:#fcfaf4;border:1px solid #ccdad4;border-radius:24px;padding:2rem;box-shadow:0 22px 55px rgba(10,49,43,.16)}h1{font:700 2.4rem/1.05 Georgia,serif}.status{padding:.8rem;border-radius:10px;background:#e2eee9}.btn{display:inline-block;margin-top:1rem;padding:.75rem 1rem;border-radius:11px;background:#0b3b37;color:white;text-decoration:none;font-weight:700}code{background:#e2eee9;padding:.15rem .35rem;border-radius:5px}</style></head><body><main class="card"><p>Grace Care Pharmacy</p><h1>The catalogue now runs as a full-stack application.</h1><p>Start the local server in PowerShell:</p><p><code>npm start</code></p><p class="status" id="status">Checking the local application…</p><a class="btn" href="http://localhost:3000">Open catalogue</a></main><script>fetch("http://localhost:3000/api/health").then(r=>{if(!r.ok)throw 0;document.getElementById("status").textContent="The server is running. Opening the catalogue…";setTimeout(()=>location.href="http://localhost:3000",500)}).catch(()=>document.getElementById("status").textContent="The server is not running yet. Open PowerShell in this folder and run npm start.")</script></body></html>
