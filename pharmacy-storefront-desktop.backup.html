<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pharmacy Storefront — Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06140E;
    --panel:rgba(255,255,255,.045);
    --panel2:rgba(255,255,255,.07);
    --border:rgba(255,255,255,.09);
    --border2:rgba(255,255,255,.14);
    --ink:#EAF3EE; --muted:#8EA39A;
    --brand:#2FD9A4; --brand-deep:#15A87B; --brand-soft:rgba(47,217,164,.13);
    --gold:#E9B24B; --wa:#25D366; --wa-dark:#1FB457; --danger:#F0795F;
    --disp:'Bricolage Grotesque',Georgia,serif; --ui:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:var(--ui);color:var(--ink);font-size:15px;line-height:1.5;
    background:
      radial-gradient(1100px 600px at 12% -8%, #123c2c 0%, rgba(18,60,44,0) 55%),
      radial-gradient(900px 600px at 100% 0%, #0c2c3a 0%, rgba(12,44,58,0) 50%),
      var(--bg);
    background-attachment:fixed;min-height:100vh}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  input{font:inherit}
  .num{font-variant-numeric:tabular-nums}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:8px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}

  .shell{display:grid;grid-template-columns:268px 1fr;max-width:1320px;margin:0 auto;min-height:100vh}

  /* sidebar */
  .side{padding:26px 20px;border-right:1px solid var(--border);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:22px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mk{width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,var(--brand),var(--brand-deep));display:grid;place-items:center;flex:none;box-shadow:0 8px 22px rgba(47,217,164,.28)}
  .brand .mk svg{width:23px;height:23px}
  .brand .nm{font-family:var(--disp);font-weight:700;font-size:17px;line-height:1.05}
  .brand .st{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
  .brand .st .d{width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 3px rgba(47,217,164,.2)}
  .search{height:44px;background:var(--panel);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;padding:0 13px}
  .search svg{width:18px;height:18px;color:var(--muted);flex:none}
  .search input{border:none;outline:none;background:none;color:var(--ink);width:100%;margin-left:9px;font-size:14.5px;font-weight:500}
  .search input::placeholder{color:var(--muted)}
  .ckNav{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 14px;border-radius:12px;background:var(--brand);color:#04231a;font-family:var(--disp);font-weight:700;font-size:15px;transition:filter .15s}
  .ckNav:hover{filter:brightness(1.07)}
  .ckNav .left{display:flex;align-items:center;gap:9px}
  .ckNav .left svg{width:18px;height:18px}
  .ckNav .ckb{background:rgba(4,35,26,.2);min-width:22px;height:22px;border-radius:99px;display:grid;place-items:center;font-size:12px;font-weight:800;padding:0 6px}
  .pays{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
  .pay{height:46px;border:1px solid var(--border);border-radius:11px;background:var(--panel);color:var(--ink);font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:8px;padding:0 11px;text-align:left;transition:.15s}
  .pay:hover{border-color:var(--border2)}
  .pay.on{border-color:var(--brand);background:var(--brand-soft)}
  .pay .pdot{width:9px;height:9px;border-radius:50%;flex:none}
  .paynote{font-size:11.5px;color:var(--muted);font-weight:500;line-height:1.45;margin-top:12px}
  .nav{display:flex;flex-direction:column;gap:3px;overflow-y:auto}
  .nav .lbl{font-size:11px;font-weight:800;letter-spacing:.7px;color:var(--muted);text-transform:uppercase;margin:4px 6px 8px}
  .nav button{display:flex;align-items:center;justify-content:space-between;height:42px;padding:0 13px;border-radius:11px;color:var(--muted);font-weight:600;font-size:14.5px;transition:background .15s,color .15s}
  .nav button:hover{background:var(--panel)}
  .nav button.on{background:var(--brand-soft);color:var(--ink)}
  .nav button .ct{font-size:12px;color:var(--muted);font-weight:600}
  .nav button.on .ct{color:var(--brand)}
  .side .cartmini{margin-top:auto;background:var(--panel);border:1px solid var(--border);border-radius:15px;padding:14px}
  .cartmini .row{display:flex;align-items:center;gap:10px}
  .cartmini .ic{width:36px;height:36px;border-radius:10px;background:var(--panel2);display:grid;place-items:center;flex:none;position:relative}
  .cartmini .ic svg{width:19px;height:19px}
  .cartmini .ic .b{position:absolute;top:-5px;right:-5px;background:var(--gold);color:#3a2a06;min-width:19px;height:19px;border-radius:99px;display:grid;place-items:center;font-size:11px;font-weight:800;padding:0 5px}
  .cartmini .t{font-family:var(--disp);font-weight:700;font-size:17px}
  .cartmini .l{font-size:11px;color:var(--muted);font-weight:600}
  .cartmini button.view{margin-top:11px;width:100%;height:42px;border-radius:11px;background:var(--brand);color:#04231a;font-family:var(--disp);font-weight:700;font-size:14px;transition:filter .15s}
  .cartmini button.view:hover{filter:brightness(1.07)}
  .cartmini button.view:disabled{opacity:.4;cursor:default}

  /* main */
  .main{padding:26px 30px 60px;min-width:0}
  .hero{position:relative;overflow:hidden;border-radius:22px;padding:26px 28px;margin-bottom:24px;
    background:linear-gradient(120deg,rgba(47,217,164,.16),rgba(12,44,58,.16));border:1px solid var(--border)}
  .hero h1{font-family:var(--disp);font-weight:800;font-size:25px;letter-spacing:-.3px;max-width:60%}
  .hero p{color:var(--muted);font-weight:500;margin-top:6px;max-width:56%;font-size:14px}
  .hero .tag{display:inline-flex;align-items:center;gap:6px;background:var(--brand-soft);color:var(--brand);font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;margin-bottom:12px}
  .hero .deco{position:absolute;right:18px;top:50%;transform:translateY(-50%);width:200px;height:200px;opacity:.9;pointer-events:none}
  .hero .deco .g{position:absolute;inset:20px;border-radius:50%;background:radial-gradient(circle,var(--brand) 0%,transparent 65%);opacity:.25;filter:blur(8px)}

  .mainhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
  .mainhead h2{font-family:var(--disp);font-weight:700;font-size:18px}
  .mainhead .cnt{font-size:13px;color:var(--muted);font-weight:600}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:18px;overflow:hidden;text-align:left;cursor:pointer;transition:transform .18s,border-color .18s,background .18s}
  .card:hover{transform:translateY(-3px);border-color:var(--border2);background:var(--panel2)}
  .pic{aspect-ratio:1.15/1;position:relative;display:grid;place-items:center;border-bottom:1px solid var(--border)}
  .pic .glow{position:absolute;width:140px;height:140px;border-radius:50%;filter:blur(30px);opacity:.4}
  .pic .mini{position:relative;width:74px;height:74px;filter:drop-shadow(0 10px 16px rgba(0,0,0,.45))}
  .pic .tag{position:absolute;top:9px;left:9px;background:rgba(6,20,14,.6);backdrop-filter:blur(6px);color:var(--muted);font-size:9px;font-weight:800;letter-spacing:.5px;padding:4px 8px;border-radius:7px;border:1px solid var(--border)}
  .pic .qb{position:absolute;top:9px;right:9px;background:var(--gold);color:#3a2a06;min-width:22px;height:22px;border-radius:99px;display:grid;place-items:center;font-weight:800;font-size:12px;padding:0 6px}
  .cbd{padding:13px 14px 15px}
  .cbd .nm{font-family:var(--disp);font-weight:700;font-size:15px;line-height:1.12}
  .cbd .ct{font-size:11.5px;color:var(--muted);font-weight:600;margin:2px 0 11px}
  .cbd .foot{display:flex;align-items:center;justify-content:space-between}
  .cbd .pr{font-size:11px;color:var(--muted);font-weight:500}
  .cbd .pr b{display:block;color:var(--ink);font-family:var(--disp);font-weight:700;font-size:16px}
  .cbd .plus{width:38px;height:38px;border-radius:11px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;transition:background .15s}
  .card:hover .cbd .plus{background:var(--brand);color:#04231a}
  .cbd .plus svg{width:18px;height:18px}

  /* modal */
  .scrim{position:fixed;inset:0;z-index:50;background:rgba(3,10,7,.66);backdrop-filter:blur(3px);display:none;overflow-y:auto;padding:24px;opacity:0;transition:opacity .16s}
  .scrim.show{display:block;opacity:1}
  .modal{width:min(860px,94vw);margin:0 auto;background:#0a1f16;border:1px solid var(--border2);border-radius:24px;overflow:hidden;display:grid;grid-template-columns:1.05fr .95fr;box-shadow:0 40px 100px rgba(0,0,0,.6)}
  .stage{position:relative;display:grid;place-items:center;perspective:1100px;touch-action:none;
    background:radial-gradient(circle at 50% 38%, #103024 0%, #081711 70%);min-height:360px;overflow:hidden}
  .stage .halo{position:absolute;width:280px;height:280px;border-radius:50%;filter:blur(40px);opacity:.45}
  .shadow{position:absolute;bottom:64px;width:150px;height:24px;border-radius:50%;background:rgba(0,0,0,.5);filter:blur(12px)}
  .hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(6,20,14,.78);border:1px solid var(--border);color:var(--ink);font-size:11.5px;font-weight:600;padding:6px 13px;border-radius:999px;display:flex;align-items:center;gap:6px;transition:opacity .35s}
  .hint svg{width:14px;height:14px}
  .closeb{position:absolute;top:14px;left:14px;width:38px;height:38px;border-radius:11px;background:rgba(6,20,14,.6);border:1px solid var(--border);display:grid;place-items:center;z-index:3}
  .closeb svg{width:19px;height:19px}

  .box{width:152px;height:206px;position:relative;transform-style:preserve-3d;will-change:transform}
  .face{position:absolute;top:50%;left:50%;overflow:hidden;border:1px solid rgba(0,0,0,.18);backface-visibility:hidden}
  .fb{background:#fbfbf9;display:flex;flex-direction:column}
  .fb .band{height:56px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--disp);font-weight:800;font-size:13px;text-align:center;padding:0 8px;letter-spacing:.2px}
  .fb .mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
  .fb .mid svg{width:46px;height:46px}
  .fb .pcs{font-family:var(--disp);font-weight:700;font-size:15px;color:#0F1A16;text-align:center}
  .fb .pcs small{display:block;font-family:var(--ui);font-size:9px;font-weight:600;color:#6A766F;letter-spacing:.5px}
  .fb .bc{height:24px;margin:0 16px 12px;background:repeating-linear-gradient(90deg,#161616 0,#161616 2px,#fbfbf9 2px,#fbfbf9 4px,#161616 4px,#161616 5px,#fbfbf9 5px,#fbfbf9 8px)}
  .side2{display:flex;align-items:center;justify-content:center}
  .side2 span{font-family:var(--disp);font-weight:700;font-size:11px;color:#fff;writing-mode:vertical-rl;letter-spacing:1.5px;text-transform:uppercase;opacity:.92}
  .cap{background:#e8eae8}

  .mpanel{padding:30px 30px 28px;display:flex;flex-direction:column}
  .mpanel .mname{font-family:var(--disp);font-weight:800;font-size:25px;line-height:1.08;letter-spacing:-.3px}
  .mpanel .mmeta{display:flex;align-items:center;gap:9px;margin-top:9px;font-size:13px;color:var(--muted);font-weight:600}
  .mpanel .mmeta .ins{display:flex;align-items:center;gap:5px;background:var(--brand-soft);color:var(--brand);padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700}
  .mpanel .mmeta .ins .d{width:6px;height:6px;border-radius:50%;background:var(--brand)}
  .seg{display:flex;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:13px;padding:4px;margin:22px 0 18px}
  .seg button{flex:1;height:54px;border-radius:10px;color:var(--muted);font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:background .15s,color .15s}
  .seg button .t{font-family:var(--disp);font-size:14.5px}
  .seg button .s{font-size:11.5px;font-weight:600}
  .seg button.on{background:var(--brand);color:#04231a}
  .seg button.on .s{color:rgba(4,35,26,.7)}
  .qrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .qrow .l{font-size:13px;color:var(--muted);font-weight:600}
  .qrow .l b{color:var(--ink)}
  .step{display:flex;align-items:center;gap:7px}
  .step button{width:46px;height:46px;border-radius:13px;background:var(--panel2);border:1px solid var(--border);color:var(--brand);font-size:23px;font-weight:700;display:grid;place-items:center;transition:background .12s}
  .step button:hover{background:var(--brand-soft)}
  .step .v{font-family:var(--disp);font-weight:700;font-size:22px;min-width:34px;text-align:center}
  .totbar{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:15px;padding:14px 17px;margin:8px 0 14px}
  .totbar .k{font-size:12px;color:var(--muted);font-weight:600}
  .totbar .v{font-family:var(--disp);font-weight:800;font-size:23px}
  .totbar .r{text-align:right;font-size:11px;color:var(--muted);font-weight:600}
  .btn-add{height:56px;border-radius:15px;background:var(--brand);color:#04231a;font-family:var(--disp);font-weight:700;font-size:17px;display:flex;align-items:center;justify-content:center;gap:9px;transition:filter .12s}
  .btn-add:hover{filter:brightness(1.07)}
  .btn-add svg{width:20px;height:20px}

  /* cart drawer */
  .drawerScrim{position:fixed;inset:0;z-index:60;background:rgba(3,10,7,.55);display:none;opacity:0;transition:opacity .18s}
  .drawerScrim.show{display:block;opacity:1}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:400px;max-width:92vw;z-index:61;background:#0a1f16;border-left:1px solid var(--border2);
    transform:translateX(100%);transition:transform .24s cubic-bezier(.2,.8,.2,1);overflow-y:auto}
  .drawer.show{transform:none}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:22px 22px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#0a1f16;z-index:2}
  .dhead h3{font-family:var(--disp);font-weight:800;font-size:20px}
  .dhead .x{width:36px;height:36px;border-radius:10px;background:var(--panel);border:1px solid var(--border);display:grid;place-items:center}
  .dhead .x svg{width:18px;height:18px}
  .dlist{padding:16px 22px;display:flex;flex-direction:column;gap:11px}
  .li{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:11px 12px}
  .li .lph{width:46px;height:46px;border-radius:11px;display:grid;place-items:center;flex:none}
  .li .lph svg{width:25px;height:25px}
  .li .info{flex:1;min-width:0}
  .li .nm{font-family:var(--disp);font-weight:700;font-size:14px;line-height:1.1}
  .li .mt{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px}
  .li .ct{display:flex;align-items:center;gap:6px;margin-top:7px}
  .li .ct button{width:28px;height:28px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);color:var(--brand);font-size:16px;font-weight:700}
  .li .ct .qv{font-weight:700;font-size:13px;min-width:18px;text-align:center}
  .li .rm{margin-left:auto;color:var(--danger);font-weight:600;font-size:12px}
  .li .pr{font-family:var(--disp);font-weight:700;font-size:14px;white-space:nowrap}
  .dfoot{border-top:1px solid var(--border);padding:18px 22px 24px;position:sticky;bottom:0;background:#0a1f16}
  .ckf label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
  .ckf .in{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--border);border-radius:12px;height:48px;padding:0 13px;margin-bottom:14px}
  .ckf .in .cc{color:var(--muted);font-weight:700}
  .ckf input{border:none;outline:none;background:none;color:var(--ink);width:100%;font-size:15px;font-weight:600}
  .dtot{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
  .dtot .k{font-family:var(--disp);font-weight:700;font-size:16px}
  .dtot .v{font-family:var(--disp);font-weight:800;font-size:24px}
  .btn-wa{width:100%;height:56px;border-radius:15px;background:var(--wa);color:#fff;font-family:var(--disp);font-weight:700;font-size:17px;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .12s}
  .btn-wa:hover{background:var(--wa-dark)}
  .btn-wa svg{width:23px;height:23px}
  .empty{text-align:center;color:var(--muted);font-weight:600;padding:50px 20px}

  .flag{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;background:rgba(233,178,75,.16);border:1px solid rgba(233,178,75,.4);color:var(--gold);font-size:11px;font-weight:700;padding:6px 14px;border-radius:999px}

  @media(max-width:880px){
    .shell{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:column;border-right:none;border-bottom:1px solid var(--border)}
    .nav{flex-direction:row;flex-wrap:wrap}.nav .lbl{display:none}.side .cartmini{display:none}
    .modal{grid-template-columns:1fr}.stage{min-height:320px}
    .hero h1,.hero p{max-width:100%}.hero .deco{display:none}
  }
</style>
</head>
<body>
<div class="shell">
  <!-- SIDEBAR -->
  <aside class="side">
    <div class="brand">
      <div class="mk"><svg viewBox="0 0 24 24" fill="#04231a"><path d="M9.2 2h5.6v6.4H21v5.6h-6.2V20H9.2v-6H3V8.4h6.2z"/></svg></div>
      <div><div class="nm">Grace Care</div><div class="st"><span class="d"></span>Open now</div></div>
    </div>
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.2-4.2"/></svg><input id="search" type="search" placeholder="Search medicine…" oninput="render()"></div>
    <button class="ckNav" onclick="openCart()"><span class="left"><svg viewBox="0 0 24 24" fill="none" stroke="#04231a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 2H2"/><circle cx="9" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/></svg>Checkout</span><span class="ckb num" id="ckNavCnt">0</span></button>
    <div class="nav" id="nav"></div>
    <div class="cartmini">
      <div class="row">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#EAF3EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 2H2"/><circle cx="9" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/></svg><span class="b" id="miniCnt">0</span></div>
        <div><div class="l" id="miniL">Empty basket</div><div class="t num" id="miniT">Le 0</div></div>
      </div>
      <button class="view" id="miniView" onclick="openCart()" disabled>View basket</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="hero">
      <div>
        <span class="tag">★ Wholesale deals</span>
        <h1>Quality medicine, ready to order.</h1>
        <p>Browse the shelf, view any box in 3D, and send your order straight to WhatsApp.</p>
      </div>
      <div class="deco"><div class="g"></div>
        <svg viewBox="0 0 200 200" fill="none"><g transform="rotate(-12 100 100)"><rect x="64" y="34" width="72" height="120" rx="6" fill="#0a1f16" stroke="#2FD9A4" stroke-width="2"/><rect x="64" y="34" width="72" height="30" rx="6" fill="#2FD9A4"/><circle cx="100" cy="98" r="15" fill="none" stroke="#2FD9A4" stroke-width="3"/><path d="M100 83v30" stroke="#2FD9A4" stroke-width="3"/><rect x="74" y="128" width="52" height="10" fill="#2FD9A4" opacity=".5"/></g></svg>
      </div>
    </div>
    <div class="mainhead"><h2 id="secTitle">All medicines</h2><span class="cnt" id="secCnt"></span></div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<!-- DETAIL MODAL -->
<div class="scrim" id="scrim" onclick="if(event.target===this)closeDetail()">
  <div class="modal" id="modal">
    <div class="stage" id="stage">
      <button class="closeb" onclick="closeDetail()" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="#EAF3EE" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      <div class="halo" id="halo"></div><div class="shadow"></div>
      <div class="box" id="box"></div>
      <div class="hint" id="hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 12l4-4M3 12l4 4M21 12l-4-4M21 12l-4 4"/></svg>Drag to rotate</div>
    </div>
    <div class="mpanel" id="mpanel"></div>
  </div>
</div>

<!-- CART DRAWER -->
<div class="drawerScrim" id="drawerScrim" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="dhead"><h3>Checkout</h3><button class="x" onclick="closeCart()"><svg viewBox="0 0 24 24" fill="none" stroke="#EAF3EE" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
  <div class="dlist" id="dlist"></div>
  <div class="dfoot" id="dfoot"></div>
</div>

<div class="flag">SAMPLE · names, prices &amp; 3D boxes are placeholders</div>

<script>
const CINK={Antibiotics:"#5B9BFF","Pain & Fever":"#FF8A6B",Malaria:"#F0C04A","Cough & Cold":"#2FD9C4",Stomach:"#B79BFF",Vitamins:"#F0C04A",Skin:"#FF8FC2"};
const ITEMS=[
 {n:"Penoplex Capsules",c:"Antibiotics",single:1500,cq:40,carton:52000},
 {n:"Panadol Extra",c:"Pain & Fever",single:800,cq:50,carton:32000},
 {n:"Penicillin V",c:"Antibiotics",single:1200,cq:40,carton:40000},
 {n:"Amoxol Syrup",c:"Antibiotics",single:4500,cq:24,carton:96000},
 {n:"Coldcalm",c:"Cough & Cold",single:1200,cq:30,carton:30000},
 {n:"Maloff Antimalarial",c:"Malaria",single:6000,cq:20,carton:110000},
 {n:"Vita-C Plus",c:"Vitamins",single:2500,cq:24,carton:52000},
 {n:"Gastro-Ease",c:"Stomach",single:1000,cq:40,carton:34000},
 {n:"Hydra Salts ORS",c:"Stomach",single:700,cq:50,carton:30000},
 {n:"Dermaheal Cream",c:"Skin",single:5500,cq:24,carton:120000},
 {n:"Bloodboost Iron",c:"Vitamins",single:3000,cq:30,carton:80000},
 {n:"Flexipain Gel",c:"Pain & Fever",single:4000,cq:24,carton:88000},
];
const WA="23276000000";
const PAYS=[{id:'orange',n:'Orange Money',c:'#FF7A00'},{id:'afri',n:'AfriMoney',c:'#E4002B'},{id:'bank',n:'Bank transfer',c:'#5B9BFF'},{id:'cash',n:'Pay on collection',c:'#2FD9A4'}];
let activeCat="All",basket=[],cur=null,mode="single",qty=1,waNum="",payMethod=null;
const money=n=>"Le "+n.toLocaleString("en-US");

function glyph(ink){return `<svg viewBox="0 0 24 24" fill="none" stroke="${ink}" stroke-width="1.7" stroke-linecap="round"><rect x="2.5" y="8" width="19" height="8" rx="4"/><path d="M12 8v8"/></svg>`}
function mini(item){const k=CINK[item.c];return `<svg class="mini" viewBox="0 0 64 64" fill="none"><rect x="16" y="8" width="32" height="48" rx="3" fill="#0a1f16" stroke="${k}" stroke-width="1.6"/><rect x="16" y="8" width="32" height="12" rx="3" fill="${k}"/><circle cx="32" cy="34" r="6.5" fill="none" stroke="${k}" stroke-width="1.6"/><path d="M32 27.5v13" stroke="${k}" stroke-width="1.6"/><rect x="22" y="47" width="20" height="4" fill="${k}" opacity=".5"/></svg>`}
function waSvg(){return `<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.3A10 10 0 1 0 12 2Zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1 1 12 20Zm4.5-5.9c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.6.1-.6.8-.8 1-.3.2-.6.1a6.6 6.6 0 0 1-3.2-2.9c-.3-.4.2-.4.6-1.2a.5.5 0 0 0 0-.5c0-.1-.6-1.5-.8-2s-.4-.4-.6-.4h-.5a1 1 0 0 0-.7.3 3 3 0 0 0-1 2.2 5.3 5.3 0 0 0 1.2 2.7 11.8 11.8 0 0 0 4.5 4c2.1.9 2.1.6 2.5.6a2.6 2.6 0 0 0 1.7-1.2 2.1 2.1 0 0 0 .2-1.2c-.1-.1-.3-.2-.5-.3Z"/></svg>`}
function qInB(i){return basket.filter(l=>l.idx===i).reduce((s,l)=>s+l.qty,0)}

function render(){
  const counts={};ITEMS.forEach(i=>counts[i.c]=(counts[i.c]||0)+1);
  const cats=["All",...new Set(ITEMS.map(i=>i.c))];
  document.getElementById("nav").innerHTML=`<div class="lbl">Categories</div>`+cats.map(c=>`<button class="${c===activeCat?'on':''}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${c}<span class="ct">${c==='All'?ITEMS.length:counts[c]}</span></button>`).join("");
  const q=(document.getElementById("search").value||"").toLowerCase();
  const list=ITEMS.map((i,idx)=>({i,idx})).filter(({i})=>(activeCat==="All"||i.c===activeCat)&&(i.n.toLowerCase().includes(q)||i.c.toLowerCase().includes(q)));
  document.getElementById("secTitle").textContent=activeCat==="All"?"All medicines":activeCat;
  document.getElementById("secCnt").textContent=list.length+(list.length===1?" item":" items");
  document.getElementById("grid").innerHTML=list.map(({i,idx})=>{const b=qInB(idx);return `<div class="card" onclick="openDetail(${idx})">
    <div class="pic"><div class="glow" style="background:${CINK[i.c]}"></div>${mini(i)}<span class="tag">3D · drag</span>${b?`<span class="qb num">${b}</span>`:""}</div>
    <div class="cbd"><div class="nm">${i.n}</div><div class="ct">${i.c}</div>
      <div class="foot"><div class="pr">from<b class="num">${money(i.single)}</b></div>
        <button class="plus" onclick="event.stopPropagation();quickAdd(${idx})" aria-label="Add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button></div></div>
  </div>`}).join("")||`<p style="grid-column:1/-1;color:var(--muted);font-weight:600;padding:30px 0">No match.</p>`;
}
function setCat(c){activeCat=c;render()}
function quickAdd(idx){const ex=basket.find(l=>l.idx===idx&&l.mode==='single');if(ex)ex.qty+=1;else basket.push({idx,mode:'single',qty:1});updateBar();render();}

/* ---- 3D box (drag only, no auto motion) ---- */
let rx=-14,ry=26,dragging=false,lastX,lastY;
function buildBox(item){
  const k=CINK[item.c],W=152,H=206,D=60,hw=W/2,hh=H/2,hd=D/2;
  const pcsTxt=(item.c==='Antibiotics'||item.c==='Pain & Fever'||item.c==='Malaria')?item.cq+"'s":item.cq+" pcs";
  const front=`<div class="face fb" style="width:${W}px;height:${H}px;transform:translate(-50%,-50%) translateZ(${hd}px)"><div class="band" style="background:${k}">${item.n}</div><div class="mid">${glyph(k)}<div class="pcs">${pcsTxt}<small>PER CARTON</small></div></div><div class="bc"></div></div>`;
  const back=`<div class="face fb" style="width:${W}px;height:${H}px;transform:translate(-50%,-50%) rotateY(180deg) translateZ(${hd}px)"><div class="band" style="background:${k}">${item.n}</div><div class="mid"><div class="pcs" style="font-size:11px;color:#6A766F;padding:0 16px;line-height:1.4">Keep out of reach of children. Store below 25°C. Sample box.</div></div><div class="bc"></div></div>`;
  const right=`<div class="face side2" style="width:${D}px;height:${H}px;background:${k};transform:translate(-50%,-50%) rotateY(90deg) translateZ(${hw}px)"><span>${item.n.split(' ')[0]}</span></div>`;
  const left=`<div class="face side2" style="width:${D}px;height:${H}px;background:${k};transform:translate(-50%,-50%) rotateY(-90deg) translateZ(${hw}px)"><span>${item.n.split(' ')[0]}</span></div>`;
  const top=`<div class="face cap" style="width:${W}px;height:${D}px;transform:translate(-50%,-50%) rotateX(90deg) translateZ(${hh}px)"></div>`;
  const bot=`<div class="face cap" style="width:${W}px;height:${D}px;transform:translate(-50%,-50%) rotateX(-90deg) translateZ(${hh}px)"></div>`;
  document.getElementById("box").innerHTML=front+back+right+left+top+bot;
  document.getElementById("halo").style.background=CINK[item.c];
  applyBox();
}
function applyBox(){document.getElementById("box").style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`}
function initDrag(){
  const st=document.getElementById("stage");
  const down=e=>{dragging=true;document.getElementById("hint").style.opacity="0";lastX=e.clientX??e.touches[0].clientX;lastY=e.clientY??e.touches[0].clientY;if(st.setPointerCapture&&e.pointerId!=null)try{st.setPointerCapture(e.pointerId)}catch(_){}};
  const move=e=>{if(!dragging)return;e.preventDefault();const x=e.clientX??e.touches[0].clientX,y=e.clientY??e.touches[0].clientY;ry+=(x-lastX)*.5;rx-=(y-lastY)*.5;rx=Math.max(-80,Math.min(80,rx));lastX=x;lastY=y;applyBox();};
  const up=()=>dragging=false;
  st.addEventListener("pointerdown",down);st.addEventListener("pointermove",move);window.addEventListener("pointerup",up);
  st.addEventListener("touchstart",down,{passive:false});st.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",up);
}

/* ---- detail ---- */
function openDetail(idx){cur=ITEMS[idx];cur._i=idx;mode="single";qty=1;rx=-14;ry=26;buildBox(cur);drawDetail();
  document.getElementById("hint").style.opacity="1";document.getElementById("scrim").classList.add("show");}
function closeDetail(){document.getElementById("scrim").classList.remove("show")}
function setMode(m){mode=m;qty=1;drawDetail()}
function step(d){qty=Math.max(1,qty+d);drawDetail()}
function unit(){return mode==="single"?cur.single:cur.carton}
function pieces(){return mode==="single"?qty:qty*cur.cq}
function drawDetail(){
  const t=unit()*qty;
  document.getElementById("mpanel").innerHTML=`
   <div class="mname">${cur.n}</div>
   <div class="mmeta"><span class="ins"><span class="d"></span>In stock</span><span>${cur.c}</span></div>
   <div class="seg"><button class="${mode==='single'?'on':''}" onclick="setMode('single')"><span class="t">Single</span><span class="s num">${money(cur.single)}/pc</span></button>
     <button class="${mode==='carton'?'on':''}" onclick="setMode('carton')"><span class="t">Carton</span><span class="s num">${money(cur.carton)} · ${cur.cq} pcs</span></button></div>
   <div class="qrow"><div class="l">${mode==='single'?'Pieces':'Cartons'} · <b class="num">${pieces()}</b> pcs total</div>
     <div class="step"><button onclick="step(-1)">−</button><span class="v num">${qty}</span><button onclick="step(1)">+</button></div></div>
   <div class="totbar"><div><div class="k">Line total</div><div class="v num">${money(t)}</div></div><div class="r">${money(unit())}<br>× ${qty}</div></div>
   <button class="btn-add" onclick="addBasket()">Add to basket</button>`;
}
function addBasket(){const ex=basket.find(l=>l.idx===cur._i&&l.mode===mode);if(ex)ex.qty+=qty;else basket.push({idx:cur._i,mode,qty});updateBar();closeDetail();render();}

function updateBar(){
  const c=basket.reduce((s,l)=>s+l.qty,0);
  const t=basket.reduce((s,l)=>{const i=ITEMS[l.idx];return s+(l.mode==='single'?i.single:i.carton)*l.qty},0);
  document.getElementById("miniCnt").textContent=c;
  document.getElementById("miniL").textContent=basket.length?basket.length+(basket.length===1?" item":" items"):"Empty basket";
  document.getElementById("miniT").textContent=money(t);
  document.getElementById("miniView").disabled=!basket.length;
  document.getElementById("ckNavCnt").textContent=c;
  if(document.getElementById("drawer").classList.contains("show"))drawCart();
}

/* ---- cart drawer ---- */
function openCart(){drawCart();document.getElementById("drawerScrim").classList.add("show");document.getElementById("drawer").classList.add("show");}
function closeCart(){document.getElementById("drawerScrim").classList.remove("show");document.getElementById("drawer").classList.remove("show");}
function editLine(i,d){basket[i].qty=Math.max(0,basket[i].qty+d);if(!basket[i].qty)basket.splice(i,1);drawCart();updateBar();render();}
function rmLine(i){basket.splice(i,1);drawCart();updateBar();render();}
function msg(){
  const lines=basket.map((l,k)=>{const i=ITEMS[l.idx];const u=l.mode==='single'?i.single:i.carton;const pc=l.mode==='single'?l.qty:l.qty*i.cq;return `${k+1}) ${i.n} — ${l.mode==='single'?'Single '+l.qty+' pcs':'Carton x'+l.qty+' ('+pc+' pcs)'} = ${money(u*l.qty)}`}).join("\n");
  const t=basket.reduce((s,l)=>{const i=ITEMS[l.idx];return s+(l.mode==='single'?i.single:i.carton)*l.qty},0);
  const pay=(PAYS.find(p=>p.id===payMethod)||{}).n;
  return `Hello Grace Care Pharmacy 👋\nMy order:\n${lines}\n\nTotal: ${money(t)} (sample)${pay?"\nPreferred payment: "+pay:""}${waNum?"\nMy number: +232 "+waNum:""}\nPlease confirm availability.`;
}
function setPay(id){payMethod=id;drawCart();}
function drawCart(){
  const list=document.getElementById("dlist"),foot=document.getElementById("dfoot");
  if(!basket.length){list.innerHTML=`<div class="empty">Your basket is empty.<br>Click a medicine to add it.</div>`;foot.innerHTML="";return}
  const t=basket.reduce((a,l)=>{const i=ITEMS[l.idx];return a+(l.mode==='single'?i.single:i.carton)*l.qty},0);
  const rows=basket.map((l,k)=>{const i=ITEMS[l.idx];const u=l.mode==='single'?i.single:i.carton;const pc=l.mode==='single'?l.qty:l.qty*i.cq;
    return `<div class="li"><div class="lph" style="background:rgba(255,255,255,.05)">${glyph(CINK[i.c])}</div>
     <div class="info"><div class="nm">${i.n}</div><div class="mt">${l.mode==='single'?'Single piece':'Carton'} · ${pc} pcs</div>
       <div class="ct"><button onclick="editLine(${k},-1)">−</button><span class="qv num">${l.qty}</span><button onclick="editLine(${k},1)">+</button><button class="rm" onclick="rmLine(${k})">Remove</button></div></div>
     <div class="pr num">${money(u*l.qty)}</div></div>`}).join("");
  const pays=`<div class="ckf" style="margin-top:8px"><label>How would you like to pay?</label>
     <div class="pays">${PAYS.map(p=>`<button class="pay ${payMethod===p.id?'on':''}" onclick="setPay('${p.id}')"><span class="pdot" style="background:${p.c}"></span>${p.n}</button>`).join("")}</div></div>
     <div class="ckf"><label>Your WhatsApp number</label><div class="in"><span class="cc">+232</span><input type="tel" inputmode="numeric" placeholder="76 123 456" value="${waNum}" oninput="waNum=this.value"></div></div>
     <div class="paynote">You arrange payment directly with the pharmacy on WhatsApp. Nothing is charged on this site.</div>`;
  list.innerHTML=rows+pays;
  const link=`https://wa.me/${WA}?text=${encodeURIComponent(msg())}`;
  foot.innerHTML=`<div class="dtot"><span class="k">Total</span><span class="v num">${money(t)}</span></div>
    <a class="btn-wa" href="${link}" target="_blank" rel="noopener">${waSvg()} Send order on WhatsApp</a>`;
}

render();updateBar();initDrag();
</script>
</body>
</html>
